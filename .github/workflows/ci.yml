name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build (native — for tests)
        run: cargo build --all

      - name: Run unit tests
        run: cargo test --all --lib

      - name: Run integration tests
        run: cargo test --all

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Clippy (all targets)
        run: cargo clippy --all-targets -- -D warnings

      - name: Clippy (WASM target)
        run: cargo clippy --all --target wasm32-unknown-unknown -- -D warnings

      - name: Format check
        run: cargo fmt --all --check

  build-wasm:
    name: Build WASM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build all contracts (WASM)
        run: |
          cargo build -p drip-stream   --target wasm32-unknown-unknown --release
          cargo build -p drip-factory  --target wasm32-unknown-unknown --release
          cargo build -p drip-governor --target wasm32-unknown-unknown --release

      - name: Report WASM sizes
        run: |
          echo "WASM sizes:"
          ls -lh target/wasm32-unknown-unknown/release/*.wasm 2>/dev/null || echo "No WASM output found"

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-contracts
          path: target/wasm32-unknown-unknown/release/*.wasm
          retention-days: 30
